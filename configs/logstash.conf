# Logstash Configuration for Home SIEM Lab
# This file defines the input, filter, and output stages

input {
  # Listen for logs on UDP port 5000
  udp {
    port => 5000
    type => "syslog"
    tags => ["network"]
  }

  # Listen for logs on TCP port 5000
  tcp {
    port => 5000
    type => "syslog"
    tags => ["network"]
  }

  # Read logs from files (for testing)
  file {
    path => "/logs/*.log"
    type => "file"
    start_position => "beginning"
    tags => ["file_input"]
  }
}

filter {
  # Skip empty lines
  if [message] =~ /^\s*$/ {
    drop {}
  }

  # Parse Syslog format
  if [type] == "syslog" {
    grok {
      match => {
        "message" => "%{SYSLOGLINE}"
      }
      remove_field => ["message"]
    }
  }

  # Parse common log formats
  if [type] == "file" {
    # Try Apache/Nginx access log format
    grok {
      match => {
        "message" => "%{HTTPD_COMBINEDLOG}"
      }
      tag_on_failure => ["grok_parse_failure"]
    }
  }

  # Extract timestamp
  date {
    match => [
      "timestamp",
      "dd/MMM/yyyy:HH:mm:ss Z",
      "ISO8601",
      "yyyy-MM-dd'T'HH:mm:ss"
    ]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # Add custom fields
  mutate {
    add_field => {
      "lab_source" => "home-siem"
      "environment" => "lab"
    }
  }

  # Parse user agents
  if [agent] {
    useragent {
      source => "agent"
      target => "user_agent"
    }
  }

  # GeoIP lookup for IP addresses
  if [clientip] {
    geoip {
      source => "clientip"
      target => "geoip"
    }
  }

  # Extract severity levels
  if [severity] {
    mutate {
      convert => { "severity" => "integer" }
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "siem-logs-%{+YYYY.MM.dd}"
    action => "index"
  }

  # Console output for debugging (optional)
  # Uncomment to see all processed events
  # stdout {
  #   codec => rubydebug
  # }

  # File output for failed parses
  if "grok_parse_failure" in [tags] {
    file {
      path => "/logs/parse_failures.log"
      codec => json
    }
  }
}
